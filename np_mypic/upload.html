<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Pic! - 사진 업로드</title>
  <style>
    @font-face {
      font-family: 'Ownglyph_ParkDaHyun';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
      font-weight: normal;
      font-display: swap;
    }

    * {
      font-family: 'Ownglyph_ParkDaHyun', sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #D1FEE0 5%, #afcded 100%);
    }
  </style>
  <link rel="stylesheet" href="app.css?v=ui-fix-20260630-8">
</head>

<body class="upload-page">
  <button class="logout-btn" type="button" onclick="handleLogout()" aria-label="logout">
    <img src="logout.png" alt="logout">
  </button>

  <header class="header">
    <h1 class="title">My Pic!</h1>
  </header>

  <main class="container upload-card">
    <button class="back-btn" type="button" onclick="moveMain()" aria-label="갤러리로 돌아가기">←</button>

    <section id="selectStep" class="upload-step">
      <div class="upload-copy">
        <h2>사진 업로드</h2>
        <p class="info-text">업로드할 이미지를 선택하세요.</p>
      </div>

      <form id="selectForm" class="upload-form" enctype="multipart/form-data">
        <input type="file" name="file" accept="image/*" id="fileInput">
        <label for="fileInput" class="upload-dropzone" id="uploadDropzone">
          <span class="upload-drop-icon">+</span>
          <span class="upload-label">사진 선택</span>
          <span class="upload-hint">JPG, PNG, GIF 이미지 · 5MB 이하</span>
        </label>
      </form>

      <p id="fileMeta" class="file-meta">선택된 파일 없음</p>
      <div id="result"></div>
    </section>

    <section id="detailStep" class="upload-step upload-detail" hidden>
      <button class="back-to-select" type="button" onclick="resetForm()" aria-label="파일 다시 선택">←</button>

      <div class="preview-content">
        <div class="preview-image-box">
          <img id="imagePreview" alt="업로드 미리보기">
        </div>

        <div class="memo-area">
          <div class="memo-panel">
            <h2>메모 작성</h2>
            <label class="memo-input-shell" for="memoInput">
              <textarea id="memoInput" placeholder="오늘의 기분이나 기억하고 싶은 순간을 적어보세요."></textarea>
            </label>
          </div>
          <button id="uploadFinalBtn" type="button">업로드하기</button>
          <div id="uploadResult"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="ui.js"></script>
  <script>
    const selectStep = document.getElementById('selectStep');
    const detailStep = document.getElementById('detailStep');
    const fileInput = document.getElementById('fileInput');
    const dropzone = document.getElementById('uploadDropzone');
    const imagePreview = document.getElementById('imagePreview');
    const memoInput = document.getElementById('memoInput');
    const uploadFinalBtn = document.getElementById('uploadFinalBtn');
    const uploadResultDiv = document.getElementById('uploadResult');
    const resultDiv = document.getElementById('result');
    const fileMeta = document.getElementById('fileMeta');
    const MAX_FILE_SIZE = 5 * 1024 * 1024;
    const DEFAULT_FILE_META = '선택된 파일 없음';

    fileInput.addEventListener('change', () => {
      handleSelectedFile(fileInput.files[0]);
    });

    ['dragenter', 'dragover'].forEach((eventName) => {
      dropzone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropzone.classList.add('is-dragging');
      });
    });

    ['dragleave', 'drop'].forEach((eventName) => {
      dropzone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropzone.classList.remove('is-dragging');
      });
    });

    dropzone.addEventListener('drop', (event) => {
      const file = event.dataTransfer.files[0];
      if (!file) return;

      const transfer = new DataTransfer();
      transfer.items.add(file);
      fileInput.files = transfer.files;
      handleSelectedFile(file);
    });

    function handleSelectedFile(file) {
      if (!file) return;

      if (!file.type.startsWith('image/')) {
        fileInput.value = '';
        fileMeta.textContent = DEFAULT_FILE_META;
        setUploadMessage(resultDiv, '이미지 파일만 업로드할 수 있습니다.', 'error');
        return;
      }

      if (file.size > MAX_FILE_SIZE) {
        fileInput.value = '';
        fileMeta.textContent = DEFAULT_FILE_META;
        setUploadMessage(resultDiv, '5MB 이하 이미지만 업로드할 수 있습니다.', 'error');
        return;
      }

      setUploadMessage(resultDiv, '', '');
      fileMeta.textContent = `${file.name} · ${formatFileSize(file.size)}`;

      const reader = new FileReader();
      reader.onload = (event) => {
        imagePreview.src = event.target.result;
        showDetailStep();
      };
      reader.readAsDataURL(file);
    }

    function showDetailStep() {
      selectStep.hidden = true;
      detailStep.hidden = false;
      document.body.classList.add('upload-detail-active');
      resultDiv.textContent = '';
    }

    function showSelectStep() {
      selectStep.hidden = false;
      detailStep.hidden = true;
      document.body.classList.remove('upload-detail-active');
      setUploadMessage(uploadResultDiv, '', '');
    }

    function resetForm() {
      fileInput.value = '';
      memoInput.value = '';
      fileMeta.textContent = DEFAULT_FILE_META;
      imagePreview.removeAttribute('src');
      showSelectStep();
    }

    uploadFinalBtn.addEventListener('click', async () => {
      const file = fileInput.files[0];
      if (!file) {
        await appAlert('업로드할 파일을 찾을 수 없습니다.', { title: '파일 없음', variant: 'error' });
        resetForm();
        return;
      }

      if (!file.type.startsWith('image/') || file.size > MAX_FILE_SIZE) {
        setUploadMessage(uploadResultDiv, '이미지는 5MB 이하만 업로드할 수 있습니다.', 'error');
        return;
      }

      setUploadMessage(uploadResultDiv, '업로드 중입니다...', '');
      uploadFinalBtn.disabled = true;

      const formData = new FormData();
      formData.append('file', file);
      formData.append('memo', memoInput.value);

      try {
        const res = await fetch('/upload', {
          method: 'POST',
          body: formData,
        });

        const json = await res.json();

        if (res.ok && json.url) {
          setUploadMessage(uploadResultDiv, '업로드 성공! 포인트 20점 적립', 'success');
          setTimeout(() => moveMain(), 900);
        } else {
          const errorMessage = json.error || '알 수 없는 오류';
          setUploadMessage(uploadResultDiv, `업로드 실패: ${errorMessage}`, 'error');
        }
      } catch (err) {
        setUploadMessage(uploadResultDiv, `네트워크 오류: ${err.message}`, 'error');
      } finally {
        uploadFinalBtn.disabled = false;
      }
    });

    function setUploadMessage(target, message, type) {
      target.textContent = message;
      target.className = 'upload-status';
      if (type) target.classList.add(`is-${type}`);
    }

    function formatFileSize(size) {
      return `${(size / 1024 / 1024).toFixed(1)}MB`;
    }

    function moveMain() {
      appNavigate('./gallery.html');
    }

    async function handleLogout() {
      try {
        const res = await fetch('/logout', { method: 'POST' });
        if (res.ok) {
          appNavigate('index.html', { replace: true });
        }
      } catch (err) {
        console.error('Logout error:', err);
      }
    }
  </script>
</body>

</html>
