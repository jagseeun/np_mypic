<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pic! - 꾸미기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @font-face {
            font-family: 'Ownglyph_ParkDaHyun';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
            font-weight: normal;
            font-display: swap;
        }
        * {
            font-family: 'Ownglyph_ParkDaHyun', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(180deg, #D1FEE0 5%, #afcded 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            max-width: 900px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .title {
            font-size: 4rem;
            font-weight: bold;
            color: #4a9b8e;
            text-align: center;
        }
        .info-icon {
            position: absolute;
            right: 0;
            width: 50px;
            height: 50px;
            background: #4a9b8e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
            cursor: pointer;
            border: none;
        }
        .info-icon:hover {
            background: #3b8379;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: #333;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .back-btn:hover {
            background: #222;
        }
        .points-display {
            position: absolute;
            top: 15px;
            right: 30px;
            font-size: 1.8rem;
            color: #4a9b8e;
            font-weight: bold;
        }
        .content {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            margin-top: 20px;
        }
        .image-section {
            flex: 1;
        }
        .image-title {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        .image-container {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            margin: 0 auto;
            border: 3px solid #ddd;
            border-radius: 10px;
            background: white;
            position: relative;
            overflow: hidden;
        }
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
        .placed-sticker {
            position: absolute;
            font-size: 2rem;
            cursor: move;
            user-select: none;
            z-index: 10;
            transform-origin: center;
        }
        .placed-sticker:hover {
            filter: drop-shadow(0 0 5px rgba(74, 155, 142, 0.8));
        }
        .placed-sticker.resizing {
            outline: 2px dashed #4a9b8e;
        }
        .resize-handle {
            position: absolute;
            bottom: -8px;
            right: -8px;
            width: 16px;
            height: 16px;
            background: #4a9b8e;
            border: 2px solid white;
            border-radius: 50%;
            cursor: nwse-resize;
            z-index: 11;
            display: none;
        }
        .decoration-section {
            flex: 0 0 350px;
        }
        .stickers-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #ddd;
            margin-bottom: 15px;
        }
        .sticker-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .sticker-item:hover {
            background: #e6f7f3;
            transform: scale(1.1);
        }
        .sticker-item.selected {
            background: #b8e6d2;
            border-color: #4a9b8e;
        }
        .price-info {
            text-align: center;
            font-size: 1.8rem;
            color: #333;
            margin: 20px 0;
            font-weight: bold;
        }
        .complete-btn {
            width: 100%;
            background: #4a9b8e;
            color: white;
            border: none;
            padding: 15px;
            font-size: 2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
        .complete-btn:hover:not(:disabled) {
            background: #3b8379;
        }
        .complete-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        @media (max-width: 768px) {
            .content {
                flex-direction: column;
            }
            .decoration-section {
                width: 100%;
            }
        }
    </style>

</head>
<body class="editor-page">
    <button class="logout-btn" type="button" onclick="handleLogout()" aria-label="로그아웃">
        <img src="logout.png" alt="로그아웃">
    </button>

    <div class="header">
        <h1 class="title">My Pic!</h1>
    </div>

    <div class="container">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="content">
            <div class="image-section">
                <div class="image-title" id="imageTitle">로딩 중...</div>
                <div class="image-container" id="imageContainer">
                    <p style="text-align:center; padding-top: 50%; color: #999;">로딩 중...</p>
                </div>
            </div>

            <div class="decoration-section">
                <div class="decoration-summary">
                    <div class="price-info">
                        가격 : <span id="totalPrice">0</span>
                    </div>
                    <div class="points-display">내 포인트 : <span id="userPoints">60</span></div>
                    <div class="sticker-status" id="stickerStatus" hidden></div>
                </div>

                <div class="stickers-grid" id="stickersGrid">
                    <div class="sticker-item" data-emoji="🎀" onclick="selectSticker(this)">🎀</div>
                    <div class="sticker-item" data-emoji="👍" onclick="selectSticker(this)">👍</div>
                    <div class="sticker-item" data-emoji="💖" onclick="selectSticker(this)">💖</div>
                    <div class="sticker-item" data-emoji="🌸" onclick="selectSticker(this)">🌸</div>
                    <div class="sticker-item" data-emoji="💯" onclick="selectSticker(this)">💯</div>
                    <div class="sticker-item" data-emoji="⭐" onclick="selectSticker(this)">⭐</div>
                    <div class="sticker-item" data-emoji="💩" onclick="selectSticker(this)">💩</div>
                    <div class="sticker-item" data-emoji="🖤" onclick="selectSticker(this)">🖤</div>
                </div>

                <div class="tool-actions">
                    <button type="button" class="tool-btn" id="undoBtn" onclick="undoLastSticker()" disabled>되돌리기</button>
                    <button type="button" class="tool-btn" id="clearBtn" onclick="clearNewStickers()" disabled>새 스티커 지우기</button>
                </div>

                <button class="complete-btn" id="completeBtn" onclick="completeDecoration()">완료</button>
                <button class="decorate-help-link" type="button" onclick="showInfo()">* 어떻게 하는지 모르겠어요.</button>
            </div>
        </div>
    </div>

    <script src="ui.js"></script>
    <script>
        let selectedSticker = null;
        let currentPoints = 0;
        let photoId = null;
        let photoImageUrl = '';
        let stickerItems = {};
        let activeResizeHandle = null;
        let stickerHistory = [];
        let deletedExistingDecorationIds = [];
        let hasExistingStickerChange = false;
        let loadedExistingDecorationIds = [];

        // 페이지 로드 시 초기화
        window.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            photoId = urlParams.get('photoId');

            if (!photoId) {
                await appAlert('잘못된 접근입니다.', { title: '접근 오류', variant: 'error' });
                appNavigate('gallery.html', { replace: true });
                return;
            }

            await loadUserPoints();
            await loadItems();
            await loadPhoto();
        });

        // 사용자 포인트 조회
        async function loadUserPoints() {
            try {
                const res = await fetch('/api/user/points');
                if (res.ok) {
                    const data = await res.json();
                    currentPoints = data.points;
                    document.getElementById('userPoints').textContent = currentPoints;
                }
            } catch (err) {
                console.error('포인트 조회 오류:', err);
            }
        }

        // 아이템(스티커) 목록 조회
        async function loadItems() {
            try {
                const res = await fetch('/api/items');
                if (res.ok) {
                    const items = await res.json();
                    items.forEach(item => {
                        stickerItems[item.emoji] = item;
                    });
                    
                    // 스티커에 가격 정보 표시
                    document.querySelectorAll('.sticker-item').forEach(el => {
                        const emoji = el.dataset.emoji;
                        if (stickerItems[emoji]) {
                            el.title = `${stickerItems[emoji].name} (${stickerItems[emoji].price}P)`;
                        }
                    });
                }
            } catch (err) {
                console.error('아이템 조회 오류:', err);
            }
        }

        // 사진 정보 조회
        async function loadPhoto() {
            const container = document.getElementById('imageContainer');
            try {
                const res = await fetch(`/api/photos/${photoId}`);
                if (!res.ok) throw new Error('사진 조회 실패');
                
                const photo = await res.json();
                photoImageUrl = photo.imageUrl;
                
                container.innerHTML = '';
                const img = document.createElement('img');
                img.src = photoImageUrl;
                img.alt = '꾸밀 사진';
                container.appendChild(img);
                
                // 제목 표시 (10자 넘으면 자르기)
                const title = photo.memo || '메모 없음';
                document.getElementById('imageTitle').textContent = title;

                // 기존 꾸미기 데이터 불러오기
                await loadExistingDecorations();
            } catch (err) {
                console.error('사진 로드 오류:', err);
                container.innerHTML = '<p style="color:red; text-align:center; padding-top: 50%;">사진을 불러올 수 없습니다.</p>';
            }
        }

        // 기존 꾸미기 데이터 불러오기
        async function loadExistingDecorations() {
            try {
                const res = await fetch(`/api/decorations/${photoId}`);
                if (res.ok) {
                    const decorations = await res.json();
                    loadedExistingDecorationIds = decorations
                        .map(deco => Number(deco.id))
                        .filter(Number.isInteger);
                    console.log('기존 꾸미기 데이터:', decorations);
                    decorations.forEach(deco => {
                        // item_id로 이모지 찾기
                        const emoji = Object.keys(stickerItems).find(emoji => stickerItems[emoji].id === deco.item_id);
                        if (emoji) {
                            console.log('기존 스티커 추가:', emoji);
                            addSticker(emoji, deco.x, deco.y, deco.scale, true, deco.id);
                        } else {
                            console.error('아이템을 찾을 수 없음:', deco.item_id);
                        }
                    });
                }
            } catch (err) {
                console.error('기존 꾸미기 로드 오류:', err);
            }
        }

        // 스티커 선택 함수
        function selectSticker(element) {
            document.querySelectorAll('.sticker-item').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            selectedSticker = element.dataset.emoji;
        }

        function toFiniteNumber(value, fallback = 0) {
            const number = parseFloat(value);
            return Number.isFinite(number) ? number : fallback;
        }

        function clampNumber(value, min, max) {
            return Math.min(Math.max(value, min), max);
        }

        function getStickerMetrics(sticker) {
            const container = document.getElementById('imageContainer');
            const rect = container.getBoundingClientRect();
            const scale = clampNumber(toFiniteNumber(sticker.dataset.scale, 1), 0.5, 3);
            const width = sticker.offsetWidth || 32;
            const height = sticker.offsetHeight || 32;

            return {
                containerWidth: rect.width,
                containerHeight: rect.height,
                widthPercent: rect.width ? (width / rect.width) * 100 : 0,
                heightPercent: rect.height ? (height / rect.height) * 100 : 0,
                scale
            };
        }

        function getClampedStickerPosition(sticker, x, y) {
            const metrics = getStickerMetrics(sticker);
            if (!metrics.containerWidth || !metrics.containerHeight) {
                return { x, y };
            }

            const scaleBleedX = Math.max(0, (metrics.widthPercent * (metrics.scale - 1)) / 2);
            const scaleBleedY = Math.max(0, (metrics.heightPercent * (metrics.scale - 1)) / 2);
            const minX = scaleBleedX;
            const minY = scaleBleedY;
            const maxX = Math.max(minX, 100 - metrics.widthPercent - scaleBleedX);
            const maxY = Math.max(minY, 100 - metrics.heightPercent - scaleBleedY);

            return {
                x: clampNumber(toFiniteNumber(x, minX), minX, maxX),
                y: clampNumber(toFiniteNumber(y, minY), minY, maxY)
            };
        }

        function setStickerPosition(sticker, x, y) {
            const position = getClampedStickerPosition(sticker, x, y);
            sticker.style.left = position.x + '%';
            sticker.style.top = position.y + '%';
        }

        function clampStickerToVisibleArea(sticker) {
            setStickerPosition(
                sticker,
                toFiniteNumber(sticker.style.left, 0),
                toFiniteNumber(sticker.style.top, 0)
            );
        }

        // 이미지 컨테이너 클릭 시 스티커 추가
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('imageContainer');
            
            container.addEventListener('click', async (e) => {
                // 스티커나 핸들 클릭 시 무시
                if (e.target.classList.contains('placed-sticker') || 
                    e.target.classList.contains('resize-handle')) {
                    return;
                }
                
                if (!selectedSticker) {
                    await appAlert('먼저 스티커를 선택해주세요.', { title: '스티커 선택' });
                    return;
                }

                const rect = container.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                const nextTotalPrice = updateTotalPrice() + getStickerPrice(selectedSticker);

                if (nextTotalPrice > currentPoints) {
                    await promptPointEarning();
                    return;
                }

                addSticker(selectedSticker, x, y, 1.0);
            });
        });

        // 스티커 추가 함수
        function addSticker(emoji, x, y, scale, isExisting = false, decorationId = null) {
            const container = document.getElementById('imageContainer');
            const sticker = document.createElement('div');
            sticker.className = 'placed-sticker';
            sticker.textContent = emoji;
            sticker.style.left = x + '%';
            sticker.style.top = y + '%';
            const normalizedScale = clampNumber(toFiniteNumber(scale, 1), 0.5, 3);
            sticker.style.transform = `scale(${normalizedScale})`;
            sticker.dataset.emoji = emoji;
            sticker.dataset.itemId = stickerItems[emoji]?.id || 0;
            sticker.dataset.scale = normalizedScale;
            
            // 기존 스티커는 가격 0으로 설정
            if (isExisting) {
                sticker.dataset.existing = 'true';
                sticker.dataset.price = 0;
                if (decorationId) {
                    sticker.dataset.decorationId = decorationId;
                }
            } else {
                sticker.dataset.price = stickerItems[emoji]?.price || 0;
            }

            // 리사이즈 핸들 추가
            const resizeHandle = document.createElement('div');
            resizeHandle.className = 'resize-handle';
            sticker.appendChild(resizeHandle);

            // 드래그 기능
            let isDragging = false;
            let isResizing = false;
            let startX, startY, initialX, initialY, initialScale;

            sticker.addEventListener('mousedown', (e) => {
                if (e.target === resizeHandle) return;
                e.preventDefault();
                e.stopPropagation();
                
                // 모든 핸들 숨기고 현재 스티커만 표시
                document.querySelectorAll('.resize-handle').forEach(h => h.style.display = 'none');
                resizeHandle.style.display = 'block';
                activeResizeHandle = resizeHandle;
                
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                initialX = parseFloat(sticker.style.left);
                initialY = parseFloat(sticker.style.top);
            });

            resizeHandle.addEventListener('mousedown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                isResizing = true;
                startX = e.clientX;
                startY = e.clientY;
                initialScale = parseFloat(sticker.dataset.scale) || 1.0;
                sticker.classList.add('resizing');
            });

            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const rect = container.getBoundingClientRect();
                    const deltaX = ((e.clientX - startX) / rect.width) * 100;
                    const deltaY = ((e.clientY - startY) / rect.height) * 100;
                    
                    setStickerPosition(sticker, initialX + deltaX, initialY + deltaY);
                } else if (isResizing) {
                    const deltaY = e.clientY - startY;
                    const scaleFactor = 1 + (deltaY / 100);
                    let newScale = initialScale * scaleFactor;
                    
                    newScale = Math.max(0.5, Math.min(newScale, 3.0));
                    
                    sticker.style.transform = `scale(${newScale})`;
                    sticker.dataset.scale = newScale;
                    clampStickerToVisibleArea(sticker);
                }
            });

            document.addEventListener('mouseup', () => {
                if (isDragging || isResizing) {
                    if (sticker.dataset.existing) {
                        hasExistingStickerChange = true;
                    }
                    isDragging = false;
                    isResizing = false;
                    sticker.classList.remove('resizing');
                    updateTotalPrice();
                }
            });

            // 더블클릭으로 삭제
            sticker.addEventListener('dblclick', async (e) => {
                e.stopPropagation();
                if (await appConfirm('스티커를 삭제하시겠습니까?', { title: '스티커 삭제', confirmText: '삭제' })) {
                    markExistingStickerDeleted(sticker);
                    stickerHistory = stickerHistory.filter(item => item !== sticker);
                    sticker.remove();
                    updateTotalPrice();
                }
            });

            container.appendChild(sticker);
            clampStickerToVisibleArea(sticker);
            if (!isExisting) {
                stickerHistory.push(sticker);
            }
            updateTotalPrice();
        }

        // 총 가격 계산
        function markExistingStickerDeleted(sticker) {
            if (!sticker.dataset.existing || !sticker.dataset.decorationId) return;

            const decorationId = Number(sticker.dataset.decorationId);
            if (Number.isInteger(decorationId) && !deletedExistingDecorationIds.includes(decorationId)) {
                deletedExistingDecorationIds.push(decorationId);
            }
            hasExistingStickerChange = true;
        }

        function updateTotalPrice() {
            let total = 0;
            
            document.querySelectorAll('.placed-sticker').forEach(sticker => {
                const price = parseInt(sticker.dataset.price) || 0;
                total += price;
            });

            document.getElementById('totalPrice').textContent = total;
            
            const btn = document.getElementById('completeBtn');
            if (total > currentPoints) {
                btn.disabled = false;
                btn.textContent = `완료 (포인트 부족)`;
            } else {
                btn.disabled = false;
                btn.textContent = '완료';
            }

            updateToolButtons(total);
            return total;
        }

        function getNewStickers() {
            return Array.from(document.querySelectorAll('.placed-sticker')).filter(sticker => !sticker.dataset.existing);
        }

        function getStickerPrice(emoji) {
            return Number(stickerItems[emoji]?.price) || 0;
        }

        function getDeletedDecorationIdsForSave() {
            const deletedIds = new Set(deletedExistingDecorationIds);
            const visibleExistingIds = new Set(
                Array.from(document.querySelectorAll('.placed-sticker[data-existing="true"][data-decoration-id]'))
                    .map(sticker => Number(sticker.dataset.decorationId))
                    .filter(Number.isInteger)
            );

            loadedExistingDecorationIds.forEach(id => {
                if (!visibleExistingIds.has(id)) {
                    deletedIds.add(id);
                }
            });

            return Array.from(deletedIds);
        }

        async function promptPointEarning() {
            const shouldEarn = await appConfirm('포인트가 부족합니다!\n클릭으로 포인트를 얻으시겠습니까?', {
                title: '포인트 부족',
                confirmText: '예',
                cancelText: '아니오'
            });

            if (shouldEarn) {
                const returnTo = encodeURIComponent(`decorate.html?photoId=${photoId}`);
                appNavigate(`points.html?returnTo=${returnTo}`);
            }

            return shouldEarn;
        }

        function updateToolButtons(total) {
            const newStickers = getNewStickers();
            const undoBtn = document.getElementById('undoBtn');
            const clearBtn = document.getElementById('clearBtn');
            const status = document.getElementById('stickerStatus');

            undoBtn.disabled = newStickers.length === 0;
            clearBtn.disabled = newStickers.length === 0;
            if (status) {
                status.hidden = true;
                status.textContent = '';
            }
        }

        function undoLastSticker() {
            while (stickerHistory.length > 0) {
                const sticker = stickerHistory.pop();
                if (sticker && sticker.isConnected && !sticker.dataset.existing) {
                    sticker.remove();
                    updateTotalPrice();
                    return;
                }
            }
            updateTotalPrice();
        }

        async function clearNewStickers() {
            const newStickers = getNewStickers();
            if (newStickers.length === 0) return;
            if (!(await appConfirm('새로 추가한 스티커를 모두 지울까요?', { title: '스티커 지우기', confirmText: '지우기' }))) return;

            newStickers.forEach(sticker => sticker.remove());
            stickerHistory = [];
            updateTotalPrice();
        }

        // 꾸미기 완료
        async function completeDecoration() {
            const totalPrice = updateTotalPrice();
            const newStickers = getNewStickers();
            const deletedDecorationIds = getDeletedDecorationIdsForSave();
            
            if (totalPrice > currentPoints) {
                await promptPointEarning();
                return;
            }

            if (newStickers.length === 0 && deletedDecorationIds.length === 0 && !hasExistingStickerChange) {
                await appAlert('저장할 변경 사항이 없습니다.', { title: '변경 사항 없음' });
                return;
            }

            const confirmMessage = totalPrice > 0
                ? `${totalPrice}P를 사용하여 변경 사항을 저장하시겠습니까?`
                : '변경 사항을 저장하시겠습니까?';
            if (!(await appConfirm(confirmMessage, { title: '꾸미기 저장', confirmText: '저장' }))) {
                return;
            }

            const btn = document.getElementById('completeBtn');
            btn.disabled = true;
            btn.textContent = '저장 중...';

            try {
                // 현재 새로 추가한 스티커만 수집 (기존 스티커 제외)
                const decorations = [];
                const updatedDecorations = [];
                document.querySelectorAll('.placed-sticker').forEach(sticker => {
                    // 새로 추가한 스티커만 (기존 것은 이미 DB에 있음)
                    if (!sticker.dataset.existing) {
                        decorations.push({
                            item_id: parseInt(sticker.dataset.itemId),
                            x: parseFloat(sticker.style.left),
                            y: parseFloat(sticker.style.top),
                            scale: parseFloat(sticker.dataset.scale) || 1.0,
                            rotation: 0
                        });
                    } else if (sticker.dataset.decorationId) {
                        updatedDecorations.push({
                            id: parseInt(sticker.dataset.decorationId),
                            x: parseFloat(sticker.style.left),
                            y: parseFloat(sticker.style.top),
                            scale: parseFloat(sticker.dataset.scale) || 1.0,
                            rotation: 0
                        });
                    }
                });

                console.log('저장할 데이터:', { photoId, totalPrice, decorations, updatedDecorations, deletedDecorationIds });

                // 서버에 전송 (추가만!)
                const res = await fetch('/api/decorate/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        photoId: parseInt(photoId),
                        decorations: decorations,
                        updatedDecorations: updatedDecorations,
                        deletedDecorationIds: deletedDecorationIds
                    })
                });

                if (!res.ok) {
                    const error = await res.json();
                    throw new Error(error.error || '저장 실패');
                }

                const result = await res.json();
                const successMessage = totalPrice > 0
                    ? `사용 포인트: ${totalPrice}P\n남은 포인트: ${result.remainingPoints}P`
                    : `변경 사항이 저장되었습니다.\n남은 포인트: ${result.remainingPoints}P`;
                await appAlert(successMessage, { title: '꾸미기 완료', variant: 'success' });
                
                appNavigate(`detail.html?photoId=${photoId}`);

            } catch (err) {
                console.error('완료 오류:', err);
                btn.disabled = false;
                btn.textContent = '완료';
                if (String(err.message || '').includes('포인트')) {
                    await promptPointEarning();
                    return;
                }
                await appAlert('저장 중 오류가 발생했습니다: ' + err.message, { title: '저장 실패', variant: 'error' });
            }
        }

        async function showInfo() {
            await appAlert('1. 스티커를 선택하고 사진을 클릭하세요.\n2. 스티커를 드래그해서 위치를 조정하세요.\n3. 오른쪽 아래 핸들로 크기를 조정하세요.\n4. 더블클릭하면 스티커를 삭제할 수 있습니다.', {
                title: '꾸미기 도움말',
                confirmText: '닫기'
            });
        }

        async function goBack() {
            if (await appConfirm('꾸미기를 취소하시겠습니까?', { title: '나가기', confirmText: '나가기' })) {
                appNavigate('./gallery.html');
            }
        }

        async function handleLogout() {
            try {
                const res = await fetch('/logout', { method: 'POST' });
                if (res.ok) {
                    await appAlert('로그아웃 되었습니다.', { title: '로그아웃', variant: 'success' });
                    appNavigate('index.html', { replace: true });
                }
            } catch (err) {
                console.error('로그아웃 오류:', err);
            }
        }
    </script>
</body>
</html>
