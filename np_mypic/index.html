<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Pic! - 로그인</title>
  <style>
    @font-face {
      font-family: 'Ownglyph_ParkDaHyun';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
      font-weight: normal;
      font-display: swap;
    }

    * {
      font-family: 'Ownglyph_ParkDaHyun', sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #D1FEE0 5%, #afcded 100%);
    }
  </style>
  <link rel="stylesheet" href="app.css?v=ui-fix-20260630-4">
</head>

<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card" aria-labelledby="authTitle">
      <div class="auth-brand">
        <h1 class="title" id="authTitle">My Pic!</h1>
        <p class="auth-subtitle">내 사진을 조용히 모아두는 공간</p>
      </div>

      <form class="auth-form" autocomplete="on">
        <label class="auth-field">
          <span>아이디</span>
          <input type="text" class="input-field" id="usernameInput" placeholder="아이디 입력" autocomplete="username">
        </label>

        <label class="auth-field">
          <span>비밀번호</span>
          <input type="password" class="input-field" id="passwordInput" placeholder="비밀번호 입력" autocomplete="current-password">
        </label>

        <div class="button-group">
          <button class="btn primary" id="loginBtn" type="submit">로그인</button>
          <button class="btn secondary" id="signupBtn" type="button">회원가입</button>
        </div>
      </form>
    </section>
  </main>

  <script src="ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loginBtn = document.getElementById('loginBtn');
      const signupBtn = document.getElementById('signupBtn');
      const usernameInput = document.getElementById('usernameInput');
      const passwordInput = document.getElementById('passwordInput');
      const form = document.querySelector('.auth-form');

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        loginBtn.click();
      });

      loginBtn.addEventListener('click', async (event) => {
        event.preventDefault();

        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        try {
          const response = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });

          const message = await response.text();
          await appAlert(message, {
            title: response.ok ? '로그인 완료' : '로그인 실패',
            variant: response.ok ? 'success' : 'error'
          });

          if (response.ok) {
            appNavigate('./gallery.html', { replace: true });
          }
        } catch (error) {
          console.error('로그인 요청 오류:', error);
          await appAlert('로그인 중 네트워크 오류가 발생했습니다.', { title: '네트워크 오류', variant: 'error' });
        }
      });

      signupBtn.addEventListener('click', async () => {
        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        try {
          const response = await fetch('/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });

          const message = await response.text();
          await appAlert(message, {
            title: response.ok ? '회원가입 완료' : '회원가입 실패',
            variant: response.ok ? 'success' : 'error'
          });
        } catch (error) {
          console.error('회원가입 요청 오류:', error);
          await appAlert('회원가입 중 네트워크 오류가 발생했습니다.', { title: '네트워크 오류', variant: 'error' });
        }
      });
    });
  </script>
</body>

</html>
