<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Pic! - 로그인</title>
  <style>
    @font-face {
      font-family: 'Ownglyph_ParkDaHyun';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
      font-weight: normal;
      font-display: swap;
    }

    * {
      font-family: 'Ownglyph_ParkDaHyun', sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(180deg, #c8f5d4 0%, #a8d8ea 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    .title {
      font-size: 5.5rem;
      font-weight: bold;
      color: #4a9b8e;
      margin-bottom: 60px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-field {
      width: 100%;
      padding: 18px 24px;
      border: none;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.8);
      font-size: 24px;
      outline: none;
    }

    .input-field::placeholder {
      color: #aaa;
    }

    .button-group {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 40px;
    }

    .btn {
      padding: 15px 40px;
      border: none;
      border-radius: 50px;
      font-size: 24px;
      font-weight: 500;
      cursor: pointer;
      min-width: 120px;
      color: #fff;
    }

    .primary {
      background: #4a9b8e;
    }

    .secondary {
      background: #6b9b8e;
    }

  </style>
</head>

<body>
  <div class="container">
    <h1 class="title">My Pic!</h1>

    <div class="input-group">
      <input type="text" class="input-field" placeholder="아이디를 입력하세요">
    </div>

    <div class="input-group">
      <input type="password" class="input-field" placeholder="비밀번호를 입력하세요">
    </div>

    <div class="button-group">
      <button class="primary">로그인</button>
      <button class="secondary">회원가입</button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loginBtn = document.querySelector('.primary');
      const signupBtn = document.querySelector('.secondary');

      // 로그인 버튼 클릭 시 실행
      loginBtn.addEventListener('click', (e) => {
        e.preventDefault(); // 폼 기본 동작 방지
        console.log('로그인 버튼 클릭');
        location.href = "./testtest.html"; // 로그인 후 이동할 페이지
      });

      // 회원가입 버튼 클릭 시 실행
      signupBtn.addEventListener('click', (e) => {
        e.preventDefault();
        console.log('회원가입 버튼 클릭');
        location.href = "./testtest.html"; // 회원가입 후 이동할 페이지
      });
    });
  </script>
</body>

</html>
