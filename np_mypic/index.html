<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Pic! - 로그인</title>
  <style>
    @font-face {
      font-family: 'Ownglyph_ParkDaHyun';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
      font-weight: normal;
      font-display: swap;
    }

    * {
      font-family: 'Ownglyph_ParkDaHyun', sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(180deg, #D1FEE0 5%, #afcded 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    .title {
      font-size: 5.5rem;
      font-weight: bold;
      color: #4a9b8e;
      margin-bottom: 60px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-field {
      width: 100%;
      padding: 18px 24px;
      border: none;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.8);
      font-size: 24px;
      outline: none;
    }

    .input-field::placeholder {
      color: #aaa;
    }

    .button-group {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 40px;
    }

    /* 버튼 공통 스타일 */
    .btn {
      padding: 15px 40px;
      border: none;
      border-radius: 50px;
      font-size: 24px;
      font-weight: 500;
      cursor: pointer;
      min-width: 120px;
      color: #fff;
      transition: all 0.2s ease-in-out;
    }

    /* 개별 버튼 스타일 */
    .primary {
      background: #4a9b8e;
    }

    .primary:hover {
      background: #3b8379;
    }

    .secondary {
      background: #6b9b8e;
    }

    .secondary:hover {
      background: #567a71;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1 class="title">My Pic!</h1>

    <div class="input-group">
      <input type="text" class="input-field" placeholder="아이디를 입력하세요" id="usernameInput">
    </div>

    <div class="input-group">
      <input type="password" class="input-field" placeholder="비밀번호를 입력하세요" id="passwordInput">
    </div>

    <div class="button-group">
      <button class="btn primary" id="loginBtn">로그인</button>
      <button class="btn secondary" id="signupBtn">회원가입</button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loginBtn = document.getElementById('loginBtn');
      const signupBtn = document.getElementById('signupBtn');
      const usernameInput = document.getElementById('usernameInput');
      const passwordInput = document.getElementById('passwordInput');

      // 로그인 버튼 클릭 시 실행
      loginBtn.addEventListener('click', async (e) => {
        e.preventDefault();

        const username = usernameInput.value;
        const password = passwordInput.value;

        try {
          const response = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });

          const message = await response.text();
          alert(message);

          if (response.ok) {
            window.location.href = "./testtest.html";
          }
        } catch (error) {
          console.error('로그인 요청 오류:', error);
          alert('로그인 중 네트워크 오류가 발생했습니다.');
        }
      });

      // 회원가입 버튼 클릭 시 실행
      signupBtn.addEventListener('click', async (e) => {
        e.preventDefault();

        const username = usernameInput.value;
        const password = passwordInput.value;

        try {
          const response = await fetch('/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });

          const message = await response.text();
          alert(message);
        } catch (error) {
          console.error('회원가입 요청 오류:', error);
          alert('회원가입 중 네트워크 오류가 발생했습니다.');
        }
      });
    });
  </script>
</body>

</html>
