<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Pic! - 로그인</title>

  <style>
    /* 폰트 불러오기 */
    @font-face {
      font-family: 'Ownglyph_ParkDaHyun';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
      font-weight: normal;
      font-display: swap;
    }

    /* 기본 스타일 초기화 및 공통 폰트 적용 */
    * {
      font-family: 'Ownglyph_ParkDaHyun', sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 배경 그라데이션 및 화면 중앙 정렬 */
    body {
      background: linear-gradient(180deg, #D1FEE0 5%, #afcded 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* 중앙 컨테이너 */
    .container {
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    /* 상단 로고 텍스트 */
    .title {
      font-size: 5.5rem;
      font-weight: bold;
      color: #4a9b8e;
      margin-bottom: 60px;
    }

    /* 입력 필드 그룹 간격 */
    .input-group {
      margin-bottom: 20px;
    }

    /* 입력창 스타일 */
    .input-field {
      width: 100%;
      padding: 18px 24px;
      border: none;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.8);
      font-size: 24px;
      outline: none;
    }

    /* 입력창 placeholder 색상 */
    .input-field::placeholder {
      color: #aaa;
    }

    /* 버튼 두 개를 가로로 정렬 */
    .button-group {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 40px;
    }

    /* 버튼 기본 디자인 */
    .btn {
      padding: 15px 40px;
      border: none;
      border-radius: 50px;
      font-size: 24px;
      font-weight: 500;
      cursor: pointer;
      min-width: 120px;
      color: #fff;
      transition: all 0.2s ease-in-out;
    }

    /* 로그인 버튼 색상 */
    .primary {
      background: #4a9b8e;
    }

    /* 로그인 버튼 hover 효과 */
    .primary:hover {
      background: #3b8379;
    }

    /* 회원가입 버튼 색상 */
    .secondary {
      background: #6b9b8e;
    }

    /* 회원가입 버튼 hover 효과 */
    .secondary:hover {
      background: #567a71;
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- 로고 제목 -->
    <h1 class="title">My Pic!</h1>

    <!-- 아이디 입력창 -->
    <div class="input-group">
      <input type="text" class="input-field" placeholder="아이디를 입력하세요" id="usernameInput">
    </div>

    <!-- 비밀번호 입력창 -->
    <div class="input-group">
      <input type="password" class="input-field" placeholder="비밀번호를 입력하세요" id="passwordInput">
    </div>

    <!-- 로그인 / 회원가입 버튼 -->
    <div class="button-group">
      <button class="btn primary" id="loginBtn">로그인</button>
      <button class="btn secondary" id="signupBtn">회원가입</button>
    </div>
  </div>

  <script>
    // HTML이 완전히 로드된 후 실행
    document.addEventListener('DOMContentLoaded', () => {
      const loginBtn = document.getElementById('loginBtn');
      const signupBtn = document.getElementById('signupBtn');
      const usernameInput = document.getElementById('usernameInput');
      const passwordInput = document.getElementById('passwordInput');

      // 로그인 버튼 클릭 시 실행되는 이벤트
      loginBtn.addEventListener('click', async (e) => {
        e.preventDefault(); // 기본 폼 제출 방지

        const username = usernameInput.value;
        const password = passwordInput.value;

        try {
          // 서버에 로그인 요청
          const response = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });

          // 서버에서 받은 응답 메시지 출력
          const message = await response.text();
          alert(message);

          // 로그인 성공 시 testtest.html로 이동
          if (response.ok) {
            window.location.href = "./testtest.html";
          }
        } catch (error) {
          console.error('로그인 요청 오류:', error);
          alert('로그인 중 네트워크 오류가 발생했습니다.');
        }
      });

      // 회원가입 버튼 클릭 시 실행되는 이벤트
      signupBtn.addEventListener('click', async (e) => {
        e.preventDefault();

        const username = usernameInput.value;
        const password = passwordInput.value;

        try {
          // 서버에 회원가입 요청
          const response = await fetch('/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });

          // 서버 응답 메시지 출력
          const message = await response.text();
          alert(message);
        } catch (error) {
          console.error('회원가입 요청 오류:', error);
          alert('회원가입 중 네트워크 오류가 발생했습니다.');
        }
      });
    });
  </script>
</body>

</html>
