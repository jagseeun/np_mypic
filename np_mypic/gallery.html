<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Pic! - 메인</title>
  <style>
    @font-face {
      font-family: 'Ownglyph_ParkDaHyun';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
      font-weight: normal;
      font-display: swap;
    }

    * {
      font-family: 'Ownglyph_ParkDaHyun';
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 전체 페이지 */
    body {
      background: linear-gradient(180deg, #D1FEE0 5%, #afcded 100%);
      min-height: 100vh;
      margin: 0;
      padding: 20px 12px 12px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    /* 제목 */
    .main-title {
      font-size: 4.2rem;
      font-weight: 800;
      color: #2f8d7d;
      margin: 0 0 10px 0;
      text-align: center;
      line-height: 1;
    }

    /* 컨테이너 */
    .container {
      width: 100%;
      max-width: 920px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 14px;
      padding: 76px 18px 76px 18px;
      box-shadow: 0 6px 22px rgba(0, 0, 0, 0.08);
      position: relative;
      height: calc(100vh - 120px);
      overflow: hidden;
    }

    /* 검색, 포인트, 로그아웃 */
    .logout-btn {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 52px;
      height: 52px;
      background: none;
      border: none;
      cursor: pointer;
      z-index: 20;
    }

    .logout-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .search-container {
      position: absolute;
      top: 18px;
      left: 18px;
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 20;
    }

    .search-input {
      padding: 9px 16px;
      font-size: 1.15rem;
      border: 2px solid #4a9b8e;
      border-radius: 22px;
      width: 220px;
      background: #fff;
    }

    .search-input:focus {
      box-shadow: 0 0 6px rgba(74, 155, 142, 0.2);
      border-color: #3b8379;
    }

    .search-btn {
      background: #4a9b8e;
      color: #fff;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .search-btn:hover {
      background: #3b8379;
    }

    .clear-search-btn {
      background: #7cb8ac;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 1.1rem;
      display: none;
    }

    .clear-search-btn.show {
      display: block;
    }

    .clear-search-btn:hover {
      background: #6aa899;
    }

    .point-display {
      position: absolute;
      top: 20px;
      right: 80px;
      font-size: 1.85rem;
      font-weight: 700;
      color: #2f7a68;
      z-index: 20;
      cursor: pointer;
      transition: all 0.2s;
      padding: 8px 16px;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.7);
    }

    .point-display:hover {
      background: rgba(74, 155, 142, 0.2);
      transform: scale(1.05);
    }

    /* 갤러리 */
    .gallery-container {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 78px;
      bottom: 118px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-right: 8px;
      z-index: 10;
    }

    .gallery-container::-webkit-scrollbar {
      width: 12px;
    }

    .gallery-container::-webkit-scrollbar-thumb {
      background: #3b8379;
      border-radius: 8px;
    }

    .gallery-container::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.04);
      border-radius: 8px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      padding-bottom: 8px;
    }

    /* 이미지 */
    .image-item {
      width: 100%;
      padding-top: 100%;
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background: linear-gradient(180deg, #f6f6f6, #efefef);
      cursor: pointer;
      transition: transform .12s ease;
    }

    .image-item:hover {
      transform: translateY(-4px);
    }

    .image-item img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 업로드 버튼 */
    .upload-btn-container {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 40px;
      z-index: 30;
      text-align: center;
    }

    .upload-btn {
      background: #4a9b8e;
      color: #fff;
      padding: 12px 54px;
      font-size: 1.9rem;
      font-weight: 800;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(74, 155, 142, 0.16);
      transition: all 0.2s;
    }

    .upload-btn:hover {
      transform: translateY(-3px);
      background: #3b8379;
    }

    /* 반응형 */
    @media (max-width: 900px) {
      .main-title {
        font-size: 3.2rem;
      }

      .upload-btn-container {
        bottom: 32px;
      }

      .upload-btn {
        padding: 10px 32px;
        font-size: 1.25rem;
      }

      .point-display {
        font-size: 1.5rem;
        right: 70px;
      }
    }

    @media (max-width: 600px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .main-title {
        font-size: 2.6rem;
      }

      .upload-btn-container {
        bottom: 28px;
      }

      .point-display {
        font-size: 1.3rem;
        right: 60px;
        top: 22px;
      }

      .search-container {
        flex-wrap: wrap;
      }

      .search-input {
        width: 180px;
        font-size: 1rem;
      }
    }
  </style>
  <link rel="stylesheet" href="app.css?v=ui-fix-20260630-21">
</head>

<body class="gallery-page">
  <button class="logout-btn" onclick="handleLogout()">
    <img src="logout.png" alt="로그아웃">
  </button>

  <h1 class="main-title">My Pic!</h1>

  <div class="container">
    <div class="search-container">
      <input type="text" id="searchInput" class="search-input" placeholder="메모로 검색...">
      <button class="search-btn" onclick="handleSearch()">🔍</button>
      <button class="clear-search-btn" id="clearSearchBtn" onclick="clearSearch()">전체보기</button>
    </div>

    <div class="point-display" onclick="goToPointPage()" title="클릭해서 포인트 모으기!">
      포인트 : <span id="user-points">0</span> ✨
    </div>

    <div class="upload-btn-container">
      <button class="upload-btn">사진 업로드</button>
    </div>

    <div class="gallery-summary" id="gallerySummary" aria-live="polite">
      <span id="galleryCount">사진을 불러오는 중...</span>
      <span id="galleryHint">최근 업로드 순</span>
    </div>

    <section class="gallery-container">
      <div class="gallery" id="userGallery"></div>
    </section>
  </div>

  <script src="ui.js"></script>
  <script>
    let allPhotos = []; // 전체 사진 목록 저장
    let isSearching = false; // 검색 상태 추적

    document.addEventListener('DOMContentLoaded', () => {
      const pointsDisplay = document.getElementById('user-points');
      const uploadBtn = document.querySelector('.upload-btn');
      const searchInput = document.getElementById('searchInput');

      // 페이지 로드 시 포인트와 사진 목록 불러오기
      loadUserPoints();
      loadUserPhotos();

      // 업로드 버튼
      uploadBtn.addEventListener('click', () => {
        appNavigate("./upload.html");
      });

      // 엔터키로 검색
      searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          handleSearch();
        }
      });

      searchInput.addEventListener('input', () => {
        if (!searchInput.value.trim() && isSearching) {
          clearSearch();
        }
      });
    });

    // 포인트 페이지로 이동
    function goToPointPage() {
      appNavigate('points.html');
    }

    // 서버에서 사용자 포인트를 불러와 표시
    async function loadUserPoints() {
      const pointsDisplay = document.getElementById('user-points');
      try {
        const response = await fetch('/api/user/points');
        if (response.ok) {
          const data = await response.json();
          pointsDisplay.textContent = data.points;
        } else {
          pointsDisplay.textContent = '로그인 필요';
          console.warn('포인트 로드 실패. 로그인 상태 확인.');
        }
      } catch (error) {
        pointsDisplay.textContent = '오류';
        console.error('포인트 로드 중 네트워크 오류:', error);
      }
    }

    // 서버에서 현재 사용자의 사진 목록을 불러오는 함수
    async function loadUserPhotos() {
      const gallery = document.getElementById('userGallery');
      renderGalleryMessage('사진을 불러오는 중입니다...');

      try {
        const response = await fetch('/api/photos/me');

        if (!response.ok) {
          const errorData = await response.json();
          renderGalleryMessage(errorData.error || '사진 로드 실패');
          return;
        }

        const photos = await response.json();
        allPhotos = photos; // 전체 사진 저장

        displayPhotos(photos);

      } catch (error) {
        console.error('사진 목록 조회 오류:', error);
        renderGalleryMessage('사진 로드 중 네트워크 오류가 발생했습니다.');
      }
    }

    // 사진 목록 화면에 표시
    function displayPhotos(photos) {
      const gallery = document.getElementById('userGallery');
      gallery.innerHTML = '';
      setGallerySummary(photos.length);

      if (photos.length === 0) {
        const message = isSearching ? '검색 결과가 없습니다.' : '아직 등록된 사진이 없습니다. 사진을 업로드해보세요!';
        renderGalleryMessage(message);
        return;
      }

      photos.forEach(photo => {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'image-item';
        itemDiv.tabIndex = 0;
        itemDiv.setAttribute('role', 'button');
        itemDiv.setAttribute('aria-label', `${photo.memo || '사진'} 상세보기`);

        const img = document.createElement('img');
        img.src = photo.imageUrl;
        img.alt = photo.memo || '사용자 사진';
        img.loading = 'lazy';

        const meta = document.createElement('div');
        meta.className = 'photo-card-meta';

        const title = document.createElement('div');
        title.className = 'photo-card-title';
        title.textContent = photo.memo || '메모 없음';

        const date = document.createElement('div');
        date.className = 'photo-card-date';
        date.textContent = formatPhotoDate(photo.created_at);

        meta.appendChild(title);
        meta.appendChild(date);

        itemDiv.addEventListener('click', () => {
          appNavigate(`detail.html?photoId=${photo.id}`);
        });
        itemDiv.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            appNavigate(`detail.html?photoId=${photo.id}`);
          }
        });

        itemDiv.appendChild(img);
        itemDiv.appendChild(meta);
        gallery.appendChild(itemDiv);
      });
    }

    function renderGalleryMessage(message) {
      const gallery = document.getElementById('userGallery');
      gallery.innerHTML = '';
      const state = document.createElement('div');
      state.className = 'state-message';
      state.textContent = message;
      gallery.appendChild(state);
      setGallerySummary(0);
    }

    function setGallerySummary(count) {
      const countEl = document.getElementById('galleryCount');
      const hintEl = document.getElementById('galleryHint');
      countEl.textContent = isSearching ? `검색 결과 ${count}장` : `내 사진 ${count}장`;
      hintEl.textContent = isSearching ? '메모 검색 중' : '최근 업로드 순';
    }

    function formatPhotoDate(value) {
      if (!value) return '날짜 없음';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '날짜 없음';
      return `${date.getFullYear()}.${date.getMonth() + 1}.${date.getDate()}`;
    }

    // 검색 처리
    async function handleSearch() {
      const searchInput = document.getElementById('searchInput');
      const searchKeyword = searchInput.value.trim();
      const clearBtn = document.getElementById('clearSearchBtn');

      if (!searchKeyword) {
        await appAlert('검색어를 입력해주세요.', { title: '검색어 없음' });
        return;
      }

      try {
        const response = await fetch(`/api/photos/search?keyword=${encodeURIComponent(searchKeyword)}`);

        if (!response.ok) {
          throw new Error('검색 실패');
        }

        const searchResults = await response.json();
        isSearching = true;
        displayPhotos(searchResults);
        clearBtn.classList.add('show'); // 전체보기 버튼 표시

      } catch (error) {
        console.error('검색 오류:', error);
        await appAlert('검색 중 오류가 발생했습니다.', { title: '검색 실패', variant: 'error' });
      }
    }

    // 검색 초기화 (전체 목록 보기)
    function clearSearch() {
      const searchInput = document.getElementById('searchInput');
      const clearBtn = document.getElementById('clearSearchBtn');

      searchInput.value = '';
      isSearching = false;
      displayPhotos(allPhotos); // 전체 사진 다시 표시
      clearBtn.classList.remove('show'); // 전체보기 버튼 숨김
    }

    // 로그아웃
    async function handleLogout() {
      try {
        const response = await fetch('/logout', { method: 'POST' });
        if (response.ok) {
          await appAlert('로그아웃 되었습니다.', { title: '로그아웃', variant: 'success' });
          appNavigate('index.html', { replace: true });
        } else {
          await appAlert('로그아웃에 실패했습니다.', { title: '로그아웃 실패', variant: 'error' });
        }
      } catch (error) {
        console.error('로그아웃 요청 오류:', error);
        await appAlert('로그아웃 중 네트워크 오류가 발생했습니다.', { title: '네트워크 오류', variant: 'error' });
      }
    }
  </script>
</body>

</html>
