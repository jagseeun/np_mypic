<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pic! - 메모 수정</title>
    <style>
        @font-face {
            font-family: 'Ownglyph_ParkDaHyun';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
            font-weight: normal;
            font-display: swap;
        }
        * {
            font-family: 'Ownglyph_ParkDaHyun', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(180deg, #D1FEE0 5%, #afcded 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            max-width: 900px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .title {
            font-size: 4rem;
            font-weight: bold;
            color: #4a9b8e;
            text-align: center;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: #333;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .back-btn:hover {
            background: #222;
        }
        .section-title {
            font-size: 2.5rem;
            color: #4a9b8e;
            margin-bottom: 20px;
            text-align: center;
            margin-top: 20px;
        }
        .content {
            display: flex;
            gap: 30px;
            align-items: center;
            margin-top: 20px;
        }
        .image-section {
            flex: 1;
        }
        .image-title {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        .image-preview {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            margin: 0 auto 30px;
            border: 3px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            background: white;
        }
        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .placed-sticker {
            position: absolute;
            font-size: 2rem;
            user-select: none;
            z-index: 10;
            transform-origin: center;
            pointer-events: none;
        }
        .edit-section {
            flex: 0 0 350px;
        }
        /* .form-group {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #ddd;
            margin-bottom: 20px;
        } */
        .form-label {
            font-size: 1.8rem;
            color: #4a9b8e;
            margin-bottom: 10px;
            display: block;
            font-weight: bold;
        }
        .memo-input {
            width: 100%;
            padding: 15px;
            font-size: 1.6rem;
            border: 2px solid #ddd;
            border-radius: 10px;
            resize: vertical;
            min-height: 120px;
            font-family: 'Ownglyph_ParkDaHyun', sans-serif;
        }
        .memo-input:focus {
            outline: none;
            border-color: #4a9b8e;
        }
        .char-count {
            text-align: right;
            font-size: 1.4rem;
            color: #666;
            margin-top: 5px;
        }
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 0px;
        }
        .btn {
            flex: 1;
            padding: 15px;
            font-size: 2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn-save {
            background: #4a9b8e;
            color: white;
        }
        .btn-save:hover:not(:disabled) {
            background: #3b8379;
        }
        .btn-save:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn-cancel {
            background: #e0e0e0;
            color: #333;
        }
        .btn-cancel:hover {
            background: #d0d0d0;
        }
        @media (max-width: 768px) {
            .title {
                font-size: 3rem;
            }
            .section-title {
                font-size: 2rem;
            }
            .container {
                padding: 30px 20px;
            }
            .content {
                flex-direction: column;
            }
            .edit-section {
                width: 100%;
            }
        }
    </style>
    <link rel="stylesheet" href="app.css?v=ui-fix-20260630-25">
</head>
<body class="memo-page">
    <button class="logout-btn" type="button" onclick="handleLogout()" aria-label="logout">
        <img src="logout.png" alt="logout">
    </button>

    <div class="header">
        <h1 class="title">My Pic!</h1>
    </div>

    <div class="container">
        <button class="back-btn" onclick="goBack()">←</button>

        <div class="content">
            <div class="image-section">
                <div class="image-title" id="imageTitle">로딩 중...</div>
                <div class="image-preview" id="imagePreview">
                    <p style="text-align:center; padding-top: 50%; color: #999;">로딩 중...</p>
                </div>
            </div>

            <div class="edit-section">
                <div class="form-group">
                    <label class="form-label" for="memoInput">메모 수정</label>
                    <textarea 
                        id="memoInput" 
                        class="memo-input" 
                        placeholder="메모를 수정합니다.(최대 100자)"
                        maxlength="100"
                    ></textarea>
                    <div class="char-count">
                        <span id="charCount">0</span> / 100
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn btn-cancel" onclick="goBack()">취소</button>
                    <button class="btn btn-save" id="saveBtn" onclick="saveMemo()">저장</button>
                </div>
            </div>
        </div>
    </div>

    <script src="ui.js"></script>
    <script>
        let photoId = null;
        let stickerItems = {};

        // 페이지 로드 시 초기화
        window.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            photoId = urlParams.get('photoId');

            if (!photoId) {
                await appAlert('잘못된 접근입니다.', { title: '접근 오류', variant: 'error' });
                appNavigate('gallery.html', { replace: true });
                return;
            }

            await loadItems();
            await loadPhoto();
            
            // 글자 수 카운터
            const memoInput = document.getElementById('memoInput');
            memoInput.addEventListener('input', updateCharCount);
        });

        // 아이템(스티커) 목록 조회
        async function loadItems() {
            try {
                const res = await fetch('/api/items');
                if (res.ok) {
                    const items = await res.json();
                    items.forEach(item => {
                        stickerItems[item.id] = item;
                    });
                }
            } catch (err) {
                console.error('아이템 조회 오류:', err);
            }
        }

        // 사진 정보 로드
        async function loadPhoto() {
            const preview = document.getElementById('imagePreview');
            
            try {
                // 사진 정보 조회
                const photoRes = await fetch(`/api/photos/${photoId}`);
                if (!photoRes.ok) throw new Error('사진 조회 실패');
                
                const photo = await photoRes.json();
                
                // 이미지 표시
                preview.innerHTML = '';
                const img = document.createElement('img');
                img.src = photo.imageUrl;
                img.alt = '내 사진';
                preview.appendChild(img);
                
                // 이미지 제목(수정 전 메모) 표시
                const title = photo.memo || '메모 없음';
                document.getElementById('imageTitle').textContent = title;
                
                // 기존 메모를 입력창에 표시
                const memoInput = document.getElementById('memoInput');
                memoInput.value = photo.memo || '';
                updateCharCount();

                // 꾸미기 데이터 조회
                const decoRes = await fetch(`/api/decorations/${photoId}`);
                if (decoRes.ok) {
                    const decorations = await decoRes.json();
                    
                    // 스티커 렌더링
                    decorations.forEach(deco => {
                        const item = stickerItems[deco.item_id];
                        if (item) {
                            const sticker = document.createElement('div');
                            sticker.className = 'placed-sticker';
                            sticker.textContent = item.emoji;
                            sticker.style.left = deco.x + '%';
                            sticker.style.top = deco.y + '%';
                            sticker.style.transform = `scale(${deco.scale})`;
                            preview.appendChild(sticker);
                        }
                    });
                }

            } catch (err) {
                console.error('사진 로드 오류:', err);
                preview.innerHTML = '<p style="color:red; text-align:center; padding-top: 50%;">사진을 불러올 수 없습니다.</p>';
            }
        }

        // 글자 수 카운터 업데이트
        function updateCharCount() {
            const memoInput = document.getElementById('memoInput');
            const charCount = document.getElementById('charCount');
            charCount.textContent = memoInput.value.length;
        }

        // 메모 저장
        async function saveMemo() {
            const memoInput = document.getElementById('memoInput');
            const newMemo = memoInput.value.trim();
            
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.textContent = '저장 중...';

            try {
                const res = await fetch(`/api/photos/${photoId}/memo`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ memo: newMemo })
                });

                if (!res.ok) {
                    const error = await res.json();
                    throw new Error(error.error || '저장 실패');
                }

                await appAlert('메모가 수정되었습니다.', { title: '저장 완료', variant: 'success' });
                appNavigate(`detail.html?photoId=${photoId}`);

            } catch (err) {
                console.error('메모 저장 오류:', err);
                await appAlert('메모 저장 중 오류가 발생했습니다: ' + err.message, { title: '저장 실패', variant: 'error' });
                saveBtn.disabled = false;
                saveBtn.textContent = '저장';
            }
        }

        // 뒤로가기
        async function handleLogout() {
            try {
                const res = await fetch('/logout', { method: 'POST' });
                if (res.ok) {
                    appNavigate('index.html', { replace: true });
                }
            } catch (err) {
                console.error('Logout error:', err);
            }
        }

        async function goBack() {
            if (await appConfirm('수정을 취소하시겠습니까?', { title: '나가기', confirmText: '나가기' })) {
                appNavigate(`detail.html?photoId=${photoId}`);
            }
        }
    </script>
</body>
</html>
